<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link href="/weather-app/assets/favicon-DUzivux-.ico" rel="icon" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <script type="module" crossorigin src="/weather-app/index.js"></script>
  <link rel="modulepreload" crossorigin href="/weather-app/assets/vendor-I1I71QQ2.js">
  <link rel="stylesheet" crossorigin href="/weather-app/assets/vendor-DnveWo0P.css">
  <link rel="stylesheet" crossorigin href="/weather-app/assets/index-C1m06wfh.css">
</head>

<body>

  <div class="weather-app">
    <div class="header-search">
      <div class="search-bar">
        <svg class="lucide lucide-location" width="22" height="22">
          <use href="/weather-app/assets/icons-O5J1NvYn.svg#location"></use>
        </svg>
        <input type="text" id="city-input" placeholder="Enter the city">
        <button id="add-city-button">
          <svg class="lucide lucide-star" width="22" height="20">
            <use href="/weather-app/assets/icons-O5J1NvYn.svg#star"></use>
          </svg>
        </button>
      </div>
      <div class="city-tags" id="city-tags-container">
        <!-- Міста будуть додані тут -->
        <button class="city-tags-toggle" id="city-tags-toggle" aria-label="Показать все города" style="display:none;">
          <svg class="arrow-left" width="28" height="28">
            <use href="/weather-app/assets/icons-O5J1NvYn.svg#arrow-left"></use>
          </svg>
        </button>
      </div>
    </div>

    <div class="weather-display">
      <div class="current-weather">
        <div class="weather-icon">
        </div>
        <div class="location">Kyiv, UA</div>
        <div class="temperature">-3°</div>
        <div class="min-max">
          <div class="min-col">
            <span class="min-label">min</span>
            <span class="min-temp">-2°</span>
          </div>
          <span class="minmax-divider">
            <svg width="1" height="40">
              <use href="/weather-app/assets/icons-O5J1NvYn.svg#vertical-line"></use>
            </svg>
          </span>
          <div class="max-col">
            <span class="max-label">max</span>
            <span class="max-temp">1°</span>
          </div>
        </div>
      </div>

      <div class="forecast-tabs">
        <button class="tab-button active" id="today-tab">Сьогодні</button>
        <button class="tab-button" id="5-days-tab">5 днів</button>
      </div>
    </div>

    <div class="date-time-info">
      <div class="date">
        8<sup>th</sup> <span class="day-of-week">Sat</span>
      </div>
      <div class="month-time-container">
        <div class="month">February</div>
        <div class="time">21:30:56</div>
      </div>
      <div class="sun-times">
        <span class="sunrise">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="M4.93 4.93l1.41 1.41"></path>
            <path d="M17.66 17.66l1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="M4.93 19.07l1.41-1.41"></path>
            <path d="M17.66 6.34l1.41-1.41"></path>
          </svg>
          07:04
        </span>
        <span class="sunset">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="M4.93 4.93l1.41 1.41"></path>
            <path d="M17.66 17.66l1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="M4.93 19.07l1.41-1.41"></path>
            <path d="M17.66 6.34l1.41-1.41"></path>
          </svg>
          17:05
        </span>
      </div>
    </div>

    <div class="quote">
      <p id="quote-text"></p>
      <p id="quote-author" class="author"></p>
    </div>

    <div class="romb"></div>

    <!-- Loader element -->
    <div id="loader" class="loader"></div>
  </div>
</body>

</html>
